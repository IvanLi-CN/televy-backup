name: Release

on:
  workflow_run:
    workflows: ["CI (main)"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      head_sha:
        description: Commit SHA on main to backfill release for
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: read
  pull-requests: read

env:
  RELEASE_HEAD_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.event.workflow_run.head_sha }}

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push') ||
      github.event_name == 'workflow_dispatch'
    outputs:
      should_release: ${{ steps.meta.outputs.should_release }}
      app_effective_version: ${{ steps.meta.outputs.app_effective_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_channel: ${{ steps.meta.outputs.release_channel }}
      bump_level: ${{ steps.meta.outputs.bump_level }}
      pr_number: ${{ steps.meta.outputs.pr_number }}
      pr_url: ${{ steps.meta.outputs.pr_url }}
      release_intent_label: ${{ steps.meta.outputs.release_intent_label }}
      reason: ${{ steps.meta.outputs.reason }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_HEAD_SHA }}

      - name: Determine release intent from merged PR labels
        id: intent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_SHA: ${{ env.RELEASE_HEAD_SHA }}
        run: bash ./.github/scripts/release-intent.sh

      - name: Compute effective version
        if: ${{ steps.intent.outputs.should_release == 'true' }}
        env:
          BUMP_LEVEL: ${{ steps.intent.outputs.bump_level }}
        run: bash ./.github/scripts/compute-version.sh

      - name: Apply prerelease suffix
        if: ${{ steps.intent.outputs.should_release == 'true' && steps.intent.outputs.release_channel == 'rc' }}
        shell: bash
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short HEAD)"
          echo "APP_EFFECTIVE_VERSION=${APP_EFFECTIVE_VERSION}-rc.${short_sha}" >> "$GITHUB_ENV"
          echo "Computed prerelease APP_EFFECTIVE_VERSION=${APP_EFFECTIVE_VERSION}-rc.${short_sha}"

      - name: Export release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          echo "should_release=${{ steps.intent.outputs.should_release }}" >> "$GITHUB_OUTPUT"
          echo "release_channel=${{ steps.intent.outputs.release_channel }}" >> "$GITHUB_OUTPUT"
          echo "bump_level=${{ steps.intent.outputs.bump_level }}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${{ steps.intent.outputs.pr_number }}" >> "$GITHUB_OUTPUT"
          echo "pr_url=${{ steps.intent.outputs.pr_url }}" >> "$GITHUB_OUTPUT"
          echo "release_intent_label=${{ steps.intent.outputs.release_intent_label }}" >> "$GITHUB_OUTPUT"
          echo "reason=${{ steps.intent.outputs.reason }}" >> "$GITHUB_OUTPUT"

          if [[ "${{ steps.intent.outputs.should_release }}" == "true" ]]; then
            echo "app_effective_version=${APP_EFFECTIVE_VERSION}" >> "$GITHUB_OUTPUT"
            echo "release_tag=v${APP_EFFECTIVE_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "app_effective_version=" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Git user
        if: ${{ steps.intent.outputs.should_release == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag (if missing)
        if: ${{ steps.intent.outputs.should_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${APP_EFFECTIVE_VERSION}"
          echo "target tag: $tag"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists. Skipping push."
          else
            git tag -a "$tag" -m "$tag"
            git push origin "$tag"
          fi

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare]
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    steps:
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_tag }}
          prerelease: ${{ needs.prepare.outputs.release_channel == 'rc' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  skipped:
    name: Release skipped
    runs-on: ubuntu-latest
    needs: [prepare]
    if: ${{ needs.prepare.outputs.should_release != 'true' }}
    steps:
      - name: Explain skip reason
        run: |
          echo "Release skipped."
          echo "reason=${{ needs.prepare.outputs.reason }}"
          echo "pr_number=${{ needs.prepare.outputs.pr_number }}"
          echo "release_intent_label=${{ needs.prepare.outputs.release_intent_label }}"
