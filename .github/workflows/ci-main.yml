name: CI (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CI: true
  RUST_TOOLCHAIN: 1.91.0

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target/ci/main/rust
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            libsqlite3-dev \
            pkg-config \
            curl

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Release script contract tests
        run: bash ./.github/scripts/test-release-scripts.sh

      - name: Cache cargo directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            crates/mtproto-helper/target
          key: ${{ runner.os }}-cargo-main-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.lock', 'crates/mtproto-helper/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-main-${{ env.RUST_TOOLCHAIN }}-
            ${{ runner.os }}-cargo-

      - name: Cargo fmt check
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --all-features

      - name: Cargo test (mtproto-helper)
        run: |
          cd crates/mtproto-helper
          cargo test

  macos-swift:
    name: macOS Swift tests
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Swift unit/UI layout tests
        run: bash scripts/macos/swift-unit-tests.sh

  release-intent-freeze:
    name: Freeze release intent
    runs-on: ubuntu-latest
    needs: [quality, macos-swift]
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Freeze merged PR release intent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          bash ./.github/scripts/freeze-release-intent.sh dist/release-intent/release-intent.json

      - name: Upload frozen release intent artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-intent-${{ github.sha }}
          path: dist/release-intent/release-intent.json
          if-no-files-found: error
          retention-days: 7
