name: PR Label Gate

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to validate
        required: true
        type: string

concurrency:
  group: label-gate-${{ github.event_name == 'pull_request_target' && github.event.pull_request.number || inputs.pr_number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  label-gate:
    name: Release intent label gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted gate scripts (base)
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Checkout workflow branch (bootstrap dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Validate release intent + channel labels
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.number || inputs.pr_number }}
        run: bash ./.github/scripts/label-gate.sh
